spring:
  application:
    name: reg-arms

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/reg_abms?stringtype=unspecified}
    username: ${DATABASE_USERNAME:ibwizaauca}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@reg.rw}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          # Fail fast instead of hanging forever when the host blocks SMTP —
          # JavaMail's default timeouts are infinite, which silently eats the
          # async send thread and never logs an error.
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
    from-name: REG ARMS Notifications

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-in-production-abcdef123456}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  ai:
    api-url: ${AI_API_URL:http://localhost:5000}
  email:
    # When set, email goes through Brevo's HTTPS API (for hosts that block SMTP).
    # When blank, the app uses SMTP (spring.mail.*) — local dev default.
    brevo-api-key: ${BREVO_API_KEY:}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    allowed-extensions: jpg,jpeg,png,pdf,doc,docx
    max-size-mb: 5
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
